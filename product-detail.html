<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Nutpa Elite</title>
    <meta id="metaDescription" name="description"
        content="Detailed specifications and B2B pricing for enterprise hardware at Nutpa Electronics Chennai.">

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="assets/logo.png">

    <link rel="stylesheet" href="css/style.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body style="padding-top:120px;">
    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <img src="assets/logo.png" alt="Nutpa Logo" id="navLogo">
                <div style="font-size: 1.5rem; font-weight: 800; color: var(--text-main);">Nutpa
                    <span>Electronics</span>
                </div>
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="products.html">Products</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </div>
            <div class="nav-actions">
                <a href="contact.html" class="btn btn-primary"
                    style="padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.8rem;">Get a Quote <i
                        data-lucide="arrow-right" style="width: 14px;"></i></a>
                <!-- Actions -->
                <button class="mobile-nav-toggle" id="menuToggle">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container section-padding" id="detailContainer">
        <!-- Dynamic Detail -->
    </div>

    <section class="section-padding bg-soft">
        <div class="container">
            <div class="section-header">
                <div>
                    <span class="subtitle">Complete the Setup</span>
                    <h2>Related Hardware</h2>
                </div>
            </div>
            <div class="featured-grid" id="relatedProducts">
                <!-- Related Products -->
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div style="text-align:center;border-top:1px solid var(--border);padding-top:4rem;">
                <p>&copy; 2026 Nutpa Electronics. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <!-- PHP Data Bridge -->
    <script src="js/data.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        // Wait for MySQL data to load from PHP
        window.addEventListener('dataLoaded', () => {
            try {
                const params = new URLSearchParams(window.location.search);
                const id = params.get('id');
                const product = (typeof products !== 'undefined' ? products : []).find(p => String(p.id) === String(id));
                const container = document.getElementById('detailContainer');

                if (!product) {
                    if (container) {
                        container.innerHTML = `<div style="text-align:center; padding: 10rem 2rem;">
                            <h2 style="color: var(--text-soft);">Product Not Found</h2>
                            <p style="margin-top: 1rem; color: var(--text-soft);">We couldn't find the product you're looking for.</p>
                            <a href="products.html" class="btn btn-primary" style="margin-top: 1.5rem;">Back to Catalog</a>
                        </div>`;
                    }
                    return;
                }

                if (!container) return;

                // --- DYNAMIC SEO ---
                // Safety: Escape backticks for template literals
                const safeName = (product.name || '').replace(/`/g, '\\`');
                const safeDesc = (product.description || '').replace(/`/g, '\\`');
                const safePrice = product.price || 'Contact for Price';
                const safeCategory = product.category || 'Hardware';
                const safeFeatures = Array.isArray(product.features) ? product.features.map(f => String(f).replace(/`/g, '\\`')) : [];

                const sName = (typeof settings !== 'undefined' && (settings.siteName || settings.site_name)) || "Nutpa Electronics";
                document.title = `${safeName} | ${sName}`;

                // --- RENDER CONTENT ---
                const media = Array.isArray(product.media) && product.media.length > 0 ? product.media : [{ url: product.image || 'assets/logo.png', type: 'image' }];

                // Prepare WhatsApp message
                const waPrice = safePrice === 'Contact for Price' ? '' : ` (Price: ₹${safePrice})`;
                const waMessage = `Hi Nutpa, I am interested in:\n🛍️ Product: ${safeName}${waPrice}\n\n📝 Specs: ${safeDesc.substring(0, 150)}...\n\nPlease share more details.`;
                const waLink = `https://wa.me/${window.settings.whatsappNumber || '919940428882'}?text=${encodeURIComponent(waMessage)}`;

                container.innerHTML = `
                    <div class="product-detail-grid">
                        <div class="media-viewer-container" data-aos="fade-right">
                            <div id="mainMediaViewer" class="image-card" style="border-radius:20px; overflow:hidden; background:#f8fafc; aspect-ratio: 1/1; display:flex; align-items:center; justify-content:center; border: 1px solid var(--border);">
                                ${media[0] ? getMediaHTML(media[0].url, media[0].type) : '<div style="color:#94a3b8;">No Image Available</div>'}
                            </div>
                            <div class="media-gallery-thumbs" style="display:flex; gap:10px; margin-top:20px; overflow-x:auto; padding-bottom:10px;">
                                ${media.map((m, i) => m && m.url ? `
                                    <div class="thumb-box ${i === 0 ? 'active' : ''}" onclick="switchMainMedia('${m.url}', '${m.type}', this)" style="width:80px; height:80px; border-radius:12px; border:2px solid ${i === 0 ? 'var(--primary)' : 'transparent'}; overflow:hidden; cursor:pointer; flex-shrink:0; background:#fff; box-shadow: var(--shadow);">
                                        ${m.type === 'image'
                        ? `<img src="${m.url}" style="width:100%; height:100%; object-fit:cover;">`
                        : `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; background:#0f172a;"><i data-lucide="play" style="color:white; width:24px;"></i></div>`}
                                    </div>
                                ` : '').join('')}
                            </div>
                        </div>
                        
                        <div data-aos="fade-left">
                            <span class="subtitle" style="display:block;margin-bottom:1rem; color: var(--primary); font-weight: 700;">
                                ${(() => {
                        const cats = (typeof categories !== 'undefined' ? categories : []);
                        const cat = cats.find(c => String(c.id) === String(safeCategory));
                        return cat ? cat.name : safeCategory;
                    })()}
                            </span>
                            <h1 style="font-size:3rem; margin-bottom:1rem; line-height: 1.1;">${safeName}</h1>
                            <div style="font-size:2.5rem;font-weight:800;color:var(--text-main);margin-bottom:2rem;">₹${safePrice}</div>
                            
                            <div style="margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border);">
                                <h4 style="text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; color: var(--text-soft); margin-bottom: 1rem; font-weight: 800;">Overview</h4>
                                <p style="font-size:1.1rem; color:var(--text-soft); line-height:1.7;">
                                    ${safeDesc || 'No detailed description provided.'}
                                </p>
                            </div>
                            
                            <div style="margin-bottom: 2.5rem;">
                                <h4 style="text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; color: var(--text-soft); margin-bottom: 1.5rem; font-weight: 800;">Technical Specifications</h4>
                                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap:1rem;">
                                    ${safeFeatures.length > 0 ?
                        safeFeatures.map(f => `
                                            <div class="glass" style="padding:1.2rem; border-radius:14px; display:flex; align-items:flex-start; gap:0.85rem; font-weight:600; font-size:0.95rem; border: 1px solid var(--border);">
                                                <i data-lucide="check-circle-2" style="width:20px; height:20px; color:var(--primary); flex-shrink:0; margin-top:2px;"></i>
                                                <span style="line-height:1.4;">${f}</span>
                                            </div>
                                        `).join('') :
                        `<p style="color: var(--text-soft);">Full specifications available on request.</p>`
                    }
                                </div>
                            </div>

                            <div style="display:flex; flex-wrap: wrap; gap:1rem; padding-top: 1rem;">
                                <a href="${waLink}" class="btn btn-primary btn-lg" target="_blank" style="padding: 1rem 2rem; border-radius: 12px;">
                                    <i data-lucide="message-circle"></i> Chat for Best Price
                                </a>
                                <a href="contact.html" class="btn btn-glass btn-lg" style="padding: 1rem 2rem; border-radius: 12px; border: 1px solid var(--border);">Get Official Quote</a>
                            </div>
                        </div>
                    </div>
                `;

                // Related Products logic
                const relatedContainer = document.getElementById('relatedProducts');
                if (relatedContainer && typeof products !== 'undefined') {
                    relatedContainer.innerHTML = '';
                    products.filter(p => String(p.category) === String(product.category) && String(p.id) !== String(product.id)).slice(0, 4).forEach((p, idx) => {
                        const relImg = p.media && p.media.length > 0 ? p.media[0].url : (p.image || 'assets/logo.png');
                        const waMsg = `Hi Nutpa, I am interested in ${p.name} (Price: ₹${p.price})`;
                        const waLnk = `https://wa.me/${(window.settings && window.settings.whatsappNumber) || '919940428882'}?text=${encodeURIComponent(waMsg)}`;
                        
                        relatedContainer.innerHTML += `
                            <div class="p-card-premium glass" data-aos="fade-up" data-aos-delay="${idx * 100}" onclick="window.location.href='product-detail.html?id=${p.id}'" style="cursor:pointer;">
                                <div class="p-img-box">
                                    <img src="${relImg}" alt="${(p.name || '').replace(/"/g, '&quot;')}" style="object-fit:contain;">
                                </div>
                                <span class="p-tag">${p.category}</span>
                                <h3 style="font-size: 1.1rem; margin: 0.5rem 0;">${p.name}</h3>
                                <div class="p-price" style="font-weight: 800; color: var(--primary);">₹${p.price}</div>
                                <div style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1.5rem;" onclick="event.stopPropagation()">
                                    <a href="product-detail.html?id=${p.id}" class="btn btn-glass" style="width: 100%; justify-content: center; font-size: 0.9rem; padding: 0.6rem; border: 1px solid var(--border);">View Technical Specs</a>
                                    <a href="${waLnk}" class="btn" style="background: #25D366; color: white; width: 100%; padding: 0.6rem; border-radius: 6px; font-size: 0.9rem; justify-content: center; border: none; text-decoration: none; display: flex; align-items: center; gap: 0.5rem;" target="_blank">📞 WhatsApp Inquiry</a>
                                </div>
                            </div>
                        `;
                    });
                }

                if (typeof settings !== 'undefined') {
                    const footerLogo = document.getElementById('footerLogo');
                    if (footerLogo && settings.siteLogo) footerLogo.src = settings.siteLogo;
                }

                lucide.createIcons();
            } catch (error) {
                console.error("Product Rendering Failed:", error);
                const container = document.getElementById('detailContainer');
                if (container) {
                    container.innerHTML = `<div style="text-align:center; padding: 10rem 2rem;">
                        <h2 style="color: var(--text-soft);">Error Loading Product</h2>
                        <p style="margin-top: 1rem; color: var(--text-soft);">Something went wrong while displaying the technical specifications.</p>
                        <a href="products.html" class="btn btn-primary" style="margin-top: 1.5rem;">Back to Catalog</a>
                    </div>`;
                }
            }
        });


        function getMediaHTML(url, type) {
            if (!url) return '<div style="color:#94a3b8;">No Media Available</div>';
            
            if (type === 'image') {
                return `<img src="${url}" style="width:100%; height:100%; object-fit:contain;" id="currentMainMedia" onerror="this.src='assets/logo.png'">`;
            } else {
                const urlStr = String(url);
                if (urlStr.includes('youtube.com') || urlStr.includes('youtu.be')) {
                    let vId = urlStr.includes('v=') ? urlStr.split('v=')[1].split('&')[0] : urlStr.split('/').pop().split('?')[0];
                    return `<iframe src="https://www.youtube.com/embed/${vId}?autoplay=1&mute=1" frameborder="0" allowfullscreen style="width:100%; height:100%; border-radius: 12px;"></iframe>`;
                }
                return `<video src="${url}" controls autoplay style="width:100%; height:100%; object-fit:contain;" id="currentMainMedia"></video>`;
            }
        }

        window.switchMainMedia = function (url, type, thumbEl) {
            const viewer = document.getElementById('mainMediaViewer');
            if (viewer) viewer.innerHTML = getMediaHTML(url, type);
            document.querySelectorAll('.thumb-box').forEach(b => b.style.borderColor = 'transparent');
            if (thumbEl) thumbEl.style.borderColor = 'var(--primary)';
            lucide.createIcons();
        };

        // UI Helpers
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (window.scrollY > 50) navbar.classList.add('scrolled');
            else navbar.classList.remove('scrolled');
        });

        // Mobile Menu
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.querySelector('.nav-links');
        if (menuToggle && navLinks) {
            menuToggle.addEventListener('click', () => {
                navLinks.classList.toggle('active');
                const icon = menuToggle.querySelector('i');
                icon.setAttribute('data-lucide', navLinks.classList.contains('active') ? 'x' : 'menu');
                lucide.createIcons();
            });
        }
    </script>
    <!-- FLOATING BUTTONS -->
    <div class="floating-controls"
        style="position: fixed; bottom: 2rem; right: 2rem; display: flex; flex-direction: column; gap: 1rem; z-index: 9999;">
        <!-- Call Button -->
        <a href="tel:+919940428882" class="call-float"
            style="display: flex; align-items: center; justify-content: center;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                stroke-linejoin="round" style="width: 30px; height: 30px;">
                <path
                    d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                </path>
            </svg>
        </a>

        <!-- WhatsApp Button -->
        <a href="https://wa.me/919940428882" class="whatsapp-float" target="_blank"
            style="display: flex; align-items: center; justify-content: center;">
            <svg viewBox="0 0 448 512" xmlns="http://www.w3.org/2000/svg" style="fill: currentColor;">
                <path
                    d="M380.9 97.1C339 55.1 283.2 32 223.9 32c-122.4 0-222 99.6-222 222 0 39.1 10.2 77.3 29.6 111L0 480l117.7-30.9c32.7 17.8 69.4 27.2 106.2 27.2 122.4 0 222-99.6 222-222 0-59.3-23-115.1-65-157.1zM223.9 445.3c-33.2 0-65.7-8.9-94-25.7l-6.7-4-69.8 18.3L72 365.2l-4.4-7c-18.5-29.4-28.2-63.3-28.2-98.2 0-101.7 82.8-184.5 184.6-184.5 49.3 0 95.6 19.2 130.4 54.1 34.8 34.9 54.1 81.2 54.1 130.5 0 101.7-82.8 184.4-184.6 184.4zm101.4-139c-5.5-2.8-32.8-16.2-37.9-18-5.1-1.9-8.8-2.8-12.5 2.8-3.7 5.6-14.3 18-17.6 21.8-3.2 3.7-6.5 4.2-12 1.4-5.5-2.8-23.2-8.5-44.2-27.1-16.4-14.6-27.4-32.7-30.6-38.1-3.2-5.5-.3-8.5 2.4-11.2 2.5-2.4 5.5-6.5 8.3-9.7 2.8-3.2 3.7-5.5 5.6-9.2 1.9-3.7.9-6.9-.5-9.7-1.4-2.8-12.5-30.1-17.1-41.2-4.5-10.8-9.1-9.3-12.5-9.5-3.2-.2-6.9-.2-10.6-.2-3.7 0-9.7 1.4-14.8 6.9-5.1 5.6-19.4 19-19.4 46.3 0 27.3 19.9 53.7 22.6 57.4 2.8 3.7 39.1 59.7 94.8 83.8 13.2 5.8 23.5 9.2 31.5 11.8 13.3 4.2 25.4 3.6 34.9 2.2 10.6-1.6 32.8-13.4 37.4-26.4 4.6-13 4.6-24.1 3.2-26.4-1.3-2.5-5-3.9-10.5-6.6z" />
            </svg>
        </a>
    </div>
</body>

</html>
